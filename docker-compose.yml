version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: benignfashion-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: adminroot
      MYSQL_DATABASE: benign_fashion
      MYSQL_USER: devuser
      MYSQL_PASSWORD: DevPass@123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --local-infile=1
      - --secure-file-priv=""

  backend:
    build:
      context: ./benign-fashion-backend
      dockerfile: Dockerfile
    container_name: benignfashion-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: devuser
      DB_PASSWORD: DevPass@123
      DB_NAME: benign_fashion
    depends_on:
      - mysql
    ports:
      - "4000:4000"
    volumes:
      - ./benign-fashion-backend/uploads:/app/uploads

  frontend:
    build:
      context: ./benign-fashion-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://benignfashion.com/api
    container_name: benignfashion-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://benignfashion.com/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: benignfashion-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./benign-fashion-backend/uploads:/var/www/uploads:ro

volumes:
  mysql-data:
